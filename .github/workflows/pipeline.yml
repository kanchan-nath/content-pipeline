name: content-pipeline

on:
  schedule:
    - cron: "0 */4 * * *" # every 4hr
  workflow_dispatch: {} # manual trigger button in Actions tab

concurrency:
  group: content-pipeline
  cancel-in-progress: false # don't kill a run mid-way, just queue next one

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # bumped from 15 — checkout+install+LLM call can eat 10-12min alone

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: run pipeline
        run: node src/pipeline.js
        env:
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO }}
          BRANCH: ${{ secrets.BRANCH }}
          PAT: ${{ secrets.PAT }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: commit generated files
        run: |
          git config user.name "pipeline-bot"
          git config user.email "bot@users.noreply.github.com"
          git add Due/ logs/
          git diff --staged --quiet || git commit -m "auto: pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push